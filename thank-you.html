<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank you | Optimize My Data</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="favicon.png" type="image/png" sizes="any" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700&family=Outfit:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .thanks-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      text-align: center;
      background: var(--color-bg);
    }
    .thanks-card {
      max-width: 28rem;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 2rem 1.5rem;
    }
    .thanks-card h1 {
      font-family: var(--font-display);
      font-size: 1.5rem;
      margin: 0 0 0.75rem;
      letter-spacing: -0.02em;
    }
    .thanks-card p {
      margin: 0 0 1.5rem;
      color: var(--color-muted);
      line-height: 1.55;
    }
  </style>
</head>
<body>
  <div class="thanks-page">
    <div class="thanks-card">
      <h1>Thank you</h1>
      <p>Your message was sent. We’ll get back to you shortly.</p>
      <a href="index.html" class="btn btn-primary">Back to home</a>
    </div>
  </div>
</body>
</html>
